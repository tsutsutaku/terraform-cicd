name: Terraform Plan

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out=plan.tfplan
          terraform show -json plan.tfplan > plan.json
        continue-on-error: true

      - name: Build Change Table
        id: table
        if: steps.plan.outcome == 'success'
        run: |
          python3 - <<'EOF'
          import json, os

          with open("plan.json") as f:
              plan = json.load(f)

          ACTION_META = {
              "create":  ("➕", "create"),
              "update":  ("✏️",  "update"),
              "delete":  ("🗑️", "destroy"),
              "replace": ("🔄", "replace"),
              "no-op":   None,
          }

          rows = []
          for r in plan.get("resource_changes", []):
              actions = r["change"]["actions"]
              if actions == ["no-op"]:
                  continue
              if "create" in actions and "delete" in actions:
                  key = "replace"
              else:
                  key = actions[0]
              meta = ACTION_META.get(key)
              if meta:
                  icon, label = meta
                  rows.append(f"| {icon} | `{r['address']}` | {label} |")

          if rows:
              header = "| | Resource | Action |\n|---|---|---|"
              table = header + "\n" + "\n".join(rows)
          else:
              table = "_変更なし_"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"table<<DELIM\n{table}\nDELIM\n")
          EOF

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fmt      = '${{ steps.fmt.outcome }}';
            const validate = '${{ steps.validate.outcome }}';
            const plan     = '${{ steps.plan.outcome }}';

            const icon = s => s === 'success' ? '✅' : '❌';
            const table = `${{ steps.table.outputs.table }}` || '_テーブル生成スキップ_';

            const output = [
              '### Terraform Plan 📋',
              '',
              `| Check | Result |`,
              `|---|---|`,
              `| Format | ${icon(fmt)} \`${fmt}\` |`,
              `| Validate | ${icon(validate)} \`${validate}\` |`,
              `| Plan | ${icon(plan)} \`${plan}\` |`,
              '',
              '#### 変更リソース一覧',
              '',
              table,
              '',
              '<details><summary>Raw plan を見る</summary>',
              '',
              '```terraform',
              `${{ steps.plan.outputs.stdout }}`,
              '```',
              '',
              '</details>',
              '',
              `> Triggered by @${{ github.actor }} on \`${{ github.event_name }}\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Terraform Plan')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: output,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: output,
              });
            }

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
